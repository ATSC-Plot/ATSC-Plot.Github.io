                helpContent.innerHTML = helpHTML;
            }

            renderHelpContent();

            updateToggleLabels();

            // 初始化默认组件
            createMixtureComponent(++solutionComponentCount, null, false);
            createMixtureComponent(++titrantComponentCount, null, true);
            updateCurveNameFromComponents();

            // 初始化指示剂选择面板
            initIndicatorPanel(document);
        });

        // 指示剂数据
        const indicators = [
            { name: '酚酞', range: [8.2, 10.0], color: 'linear-gradient(to right, #ffffff, #ff0000)' },
            { name: '甲基橙', range: [3.2, 4.4], color: 'linear-gradient(to right, #ff0000, #ffff00)' },
            { name: '百里酚酞', range: [9.4, 10.6], color: 'linear-gradient(to right, #ffffff, #0000ff)' },
            { name: '溴百里酚蓝', range: [6.0, 7.6], color: 'linear-gradient(to right, #ffff00, #0000ff)' },
        ];

        // 初始化指示剂面板
        function initIndicatorPanel(pane) {
            const indicatorList = pane.querySelector('#indicatorList');
            if (!indicatorList) return;
            if (indicatorList.children.length > 0) return;

            indicators.forEach(indicator => {
                const item = document.createElement('div');
                item.className = 'indicator-item';
                item.innerHTML = `
                    <div class="indicator-color-bar" style="background: ${indicator.color};"></div>
                    <div class="indicator-content">
                        <div>${indicator.name}</div>
                        <div class="indicator-range">pH ${indicator.range[0]} - ${indicator.range[1]}</div>
                    </div>
                `;
                item.dataset.indicator = JSON.stringify(indicator);
                item.addEventListener('click', () => toggleIndicator(indicator));
                indicatorList.appendChild(item);
            });
        }

        // 切换指示剂显示
        function toggleIndicator(indicator) {
            const items = document.querySelectorAll('.indicator-item');
            let item = null;
            items.forEach(el => {
                const data = el.dataset.indicator;
                if (data) {
                    try {
                        const parsed = JSON.parse(data);
                        if (parsed.name === indicator.name) {
                            item = el;
                        }
                    } catch (e) {}
                }
            });
            if (!item) return;

            item.classList.toggle('active');
            const isActive = item.classList.contains('active');

            if (isActive) {
                showIndicatorRange(indicator);
            } else {
                hideIndicatorRange(indicator);
            }
        }

        // 显示指示剂pH变色范围
        function showIndicatorRange(indicator) {
            const activeTab = getActiveTab();
            if (!activeTab || !activeTab.chart) return;

            const tab = activeTab;
            if (!tab.volumes || !tab.phs || tab.volumes.length === 0) return;

            const volumes = tab.volumes;
            const phs = tab.phs;
            const indicatorRange = indicator.range;
            const [startPH, endPH] = indicatorRange;
            const isPaperStyle = chartStyle === 'paper';

            // 查找滴定曲线上与指示剂变色范围对应的体积点
            function findVolumeForPH(targetPH) {
                for (let i = 0; i < phs.length - 1; i++) {
                    if ((phs[i] <= targetPH && phs[i + 1] >= targetPH) ||
                        (phs[i] >= targetPH && phs[i + 1] <= targetPH)) {
                        if (phs[i + 1] === phs[i]) {
                            return volumes[i];
                        }
                        const t = (targetPH - phs[i]) / (phs[i + 1] - phs[i]);
                        return volumes[i] + t * (volumes[i + 1] - volumes[i]);
                    }
                }
                return null;
            }

            // 查找整个pH范围内的体积范围
            function findVolumeRangeForPHRange(startPH, endPH) {
                let minVolume = Infinity;
                let maxVolume = -Infinity;
                
                for (let i = 0; i < phs.length; i++) {
                    const ph = phs[i];
                    if ((ph >= startPH && ph <= endPH) || (ph >= endPH && ph <= startPH)) {
                        minVolume = Math.min(minVolume, volumes[i]);
                        maxVolume = Math.max(maxVolume, volumes[i]);
                    }
                }
                
                return minVolume < Infinity && maxVolume > -Infinity ? { min: minVolume, max: maxVolume } : null;
            }

            if (!tab.chart.options.plugins.annotation) {
                tab.chart.options.plugins.annotation = { annotations: {} };
            }

            // 查找变色范围的起始和终止pH值对应的体积点
            const startVol = findVolumeForPH(startPH);
            const endVol = findVolumeForPH(endPH);
            const volumeRange = findVolumeRangeForPHRange(startPH, endPH);
            
            // 获取曲线的实际x轴范围，确保所有标记都在此范围内
            const dataXMin = volumes[0];
            const dataXMax = volumes[volumes.length - 1];

            // 清除之前的注释
            hideIndicatorRange(indicator);

            // 获取系统主题颜色
            const themeColors = getThemeColors();
            const isDarkTheme = document.documentElement.getAttribute('data-theme') === 'dark';
            const labelTextColor = themeColors.textPrimary;
            const labelBgColor = isDarkTheme ? 'rgba(30, 30, 40, 0.8)' : 'rgba(255, 255, 255, 0.8)';
            const labelBorderColor = isDarkTheme ? 'rgba(255, 255, 255, 0.2)' : 'rgba(0, 0, 0, 0.2)';
            
            // 计算5%的图表宽度作为最小间距
            const chartWidth = tab.chart.width || 800; // 默认宽度
            const minSpacing = chartWidth * 0.08; // 8%的图表宽度
            const xAdjustValue = Math.max(20, minSpacing); // 确保至少20像素

            // 绘制水平短线段和标签
            if (startVol !== null && startVol >= dataXMin && startVol <= dataXMax) {
                tab.chart.options.plugins.annotation.annotations[`indicator-line-${indicator.name}-start`] = {
                    id: `indicator-line-${indicator.name}-start`,
                    type: 'line',
                    xMin: Math.max(dataXMin, startVol - 0.8),
                    xMax: Math.min(dataXMax, startVol + 0.8),
                    yMin: startPH,
                    yMax: startPH,
                    borderColor: 'rgba(255, 0, 0, 0.5)',
                    borderWidth: 3,
                    borderDash: [],
                    label: {
                        display: true,
                        content: `pH ${startPH}`,
                        position: {
                            x: 'end',
                            y: 'middle'
                        },
                        xAdjust: xAdjustValue, // 水平间距，确保至少5%的图表宽度
                        yAdjust: 0,
                        backgroundColor: labelBgColor,
                        borderColor: labelBorderColor,
                        borderWidth: 1,
                        borderRadius: 6,
                        color: labelTextColor,
                        font: { size: isPaperStyle ? 15 : 10, weight: '600' },
                        padding: { top: 4, bottom: 4, left: 8, right: 8 }
                    }
                };
            }

            if (endVol !== null && endVol >= dataXMin && endVol <= dataXMax) {
                tab.chart.options.plugins.annotation.annotations[`indicator-line-${indicator.name}-end`] = {
                    id: `indicator-line-${indicator.name}-end`,
                    type: 'line',
                    xMin: Math.max(dataXMin, endVol - 0.8),
                    xMax: Math.min(dataXMax, endVol + 0.8),
                    yMin: endPH,
                    yMax: endPH,
                    borderColor: 'rgba(255, 0, 0, 0.5)',
                    borderWidth: 3,
                    borderDash: [],
                    label: {
                        display: true,
                        content: `pH ${endPH}`,
                        position: {
                            x: 'end',
                            y: 'middle'
                        },
                        xAdjust: xAdjustValue, // 水平间距，确保至少5%的图表宽度
                        yAdjust: 0,
                        backgroundColor: labelBgColor,
                        borderColor: labelBorderColor,
                        borderWidth: 1,
                        borderRadius: 6,
                        color: labelTextColor,
                        font: { size: isPaperStyle ? 15 : 10, weight: '600' },
                        padding: { top: 4, bottom: 4, left: 8, right: 8 }
                    }
                };
            }

            // 绘制变色范围的区域
            if (volumeRange) {
                // 限制变色范围区域在曲线实际x轴范围内
                const boxXMin = Math.max(dataXMin, volumeRange.min);
                const boxXMax = Math.min(dataXMax, volumeRange.max);
                
                // 只有当范围有效时才绘制
                if (boxXMin < boxXMax) {
                    tab.chart.options.plugins.annotation.annotations[`indicator-box-${indicator.name}`] = {
                        id: `indicator-box-${indicator.name}`,
                        type: 'box',
                        xMin: boxXMin,
                        xMax: boxXMax,
                        yMin: Math.min(startPH, endPH),
                        yMax: Math.max(startPH, endPH),
                        backgroundColor: 'rgba(255, 200, 0, 0.15)',
                        borderColor: 'rgba(255, 150, 0, 0.5)',
                        borderWidth: 0 // 不显示边框
                    };
                }
            }

            tab.chart.update();
        }

        // 隐藏指示剂pH变色范围
        function hideIndicatorRange(indicator) {
            const activeTab = getActiveTab();
            if (!activeTab || !activeTab.chart || !activeTab.chart.options.plugins.annotation) return;

            delete activeTab.chart.options.plugins.annotation.annotations[`indicator-line-${indicator.name}-start`];
            delete activeTab.chart.options.plugins.annotation.annotations[`indicator-line-${indicator.name}-end`];
            delete activeTab.chart.options.plugins.annotation.annotations[`indicator-box-${indicator.name}`];
            activeTab.chart.update();
        }
    </script>

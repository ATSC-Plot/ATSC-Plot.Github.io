        /**
         * 设置标签页控件
         * 功能：为标签页添加各种交互控件的事件监听器
         * 处理的控件包括：
         * 1. 显示原始数据点开关
         * 2. 朴素标签开关
         * 3. 显示一阶导数开关
         * 4. 清除标记按钮
         * 5. 下载图表按钮
         * 6. 生成Mathematica代码按钮
         * 7. 图表宽度调整
         * 8. 图表比例调整
         * 9. 按体积取点功能
         * 10. 曲线选择菜单（多曲线模式）
         */
        function setupTabControls(tab, pane) {
            const rawToggle = pane.querySelector('[data-role="raw-toggle"]');
            const simpleToggle = pane.querySelector('[data-role="simple-label-toggle"]');
            const labelToggle = pane.querySelector('[data-role="label-toggle"]');
            const derivativeToggle = pane.querySelector('[data-role="derivative-toggle"]');
            const clearBtn = pane.querySelector('[data-role="clear-marks"]');
            const downloadBtn = pane.querySelector('[data-role="download"]');
            const mathBtn = pane.querySelector('[data-role="mathematica"]');
            const mathOutput = pane.querySelector('[data-role="math-output"]');
            const widthInput = pane.querySelector('[data-role="chart-width"]');
            const aspectSelect = pane.querySelector('[data-role="chart-aspect"]');
            const volumeInput = pane.querySelector('[data-role="volume-input"]');
            const volumeBtn = pane.querySelector('[data-role="volume-pick-btn"]');
            const phBtn = pane.querySelector('[data-role="ph-pick-btn"]');
            const curvePickToggle = pane.querySelector('[data-role="curve-pick-toggle"]');
            const curvePickMenu = pane.querySelector('[data-role="curve-pick-menu"]');
            const canvas = pane.querySelector('[data-role="chart-canvas"]');

            // 初始化控件状态
            rawToggle.checked = tab.showRawPoints;
            simpleToggle.checked = tab.simpleLabelMode;
            if (labelToggle) labelToggle.checked = tab.showLabel;
            
            // 一阶导数显示控制
            if (derivativeToggle) {
                derivativeToggle.checked = tab.showDerivative || false;
                derivativeToggle.addEventListener('change', () => {
                    tab.showDerivative = derivativeToggle.checked;
                    if (tab.showDerivative) {
                        const wrapper = pane.querySelector('.derivative-chart-wrapper');
                        if (wrapper) wrapper.style.display = 'block';
                        if (tab.volumes && tab.phs && tab.volumes.length > 0) {
                            updateDerivativeChart(tab, tab.volumes, tab.phs, config.curveColor, config.curveStyle);
                        }
                    } else {
                        hideDerivativeChart(tab);
                    }
                });
            }
            
            // 原始数据点显示控制
            rawToggle.addEventListener('change', () => {
                tab.showRawPoints = rawToggle.checked;
                renderActiveTabChart();
            });
            
            // 朴素标签模式控制
            simpleToggle.addEventListener('change', () => {
                tab.simpleLabelMode = simpleToggle.checked;
                refreshTabAnnotations(tab);
            });

            // 标签显示控制
            if (labelToggle) {
                labelToggle.addEventListener('change', () => {
                    tab.showLabel = labelToggle.checked;
                    refreshTabAnnotations(tab);
                });
            }
            
            // 清除标记按钮
            clearBtn.addEventListener('click', () => clearAllMarks(tab));
            
            // 下载图表按钮
            downloadBtn.addEventListener('click', () => {
                if (tab.type === 'multi') {
                    downloadMultiChart(tab);
                } else {
                    downloadChart(tab);
                }
            });
            
            // 生成Mathematica代码按钮
            if (mathBtn) {
                mathBtn.addEventListener('click', () => {
                    const setOutput = (text) => {
                        if (!mathOutput) return;
                        mathOutput.textContent = text || '';
                        mathOutput.classList.toggle('active', !!text);
                    };
                    if (tab.type === 'multi') {
                        const indices = Array.isArray(tab.curveSelection) ? tab.curveSelection.filter(i => Number.isFinite(i)) : [];
                        if (indices.length === 0) {
                            showAlert('提示', '请先在"绘制曲线"中勾选要导出的曲线', '⚠');
                            return;
                        }
                        const curves = indices.map(idx => savedCurves[idx]).filter(curve => curve && curve.params);
                        if (curves.length === 0) {
                            showAlert('提示', '未找到选定曲线', '⚠');
                            return;
                        }
                        const code = buildMathematicaCodeFromCurves(curves, tab);
                        if (!code) {
                            showAlert('提示', '未找到可用于求根生成的曲线参数', '⚠');
                            return;
                        }
                        copyText(code);
                        setOutput(code);
                        showAlert('成功', 'Mathematica代码已复制到剪贴板', '✓');
                        return;
                    }
                    const code = buildMathematicaCodeFromConfig(config, tab);
                    copyText(code);
                    setOutput(code);
                    showAlert('成功', 'Mathematica代码已复制到剪贴板', '✓');
                });
            }
            
            // 图表宽度调整
            widthInput.addEventListener('input', () => applyChartWidth(tab, widthInput.value));
            
            // 图表比例调整
            aspectSelect.addEventListener('change', () => applyChartAspectRatio(tab, aspectSelect.value));
            
            // 按体积取点功能
            volumeBtn.addEventListener('click', () => {
                const value = parseFloat(volumeInput.value);
                if (!Number.isFinite(value)) return;
                if (value < 0 || value > config.maxVolume) {
                    showAlert('提示', '数值溢出', '⚠');
                    return;
                }
                pickPointByVolume(tab, value);
            });

            // 按pH取点功能
            phBtn.addEventListener('click', () => {
                const value = parseFloat(volumeInput.value);
                if (!Number.isFinite(value)) return;
                if (value < 0 || value > 14) {
                    showAlert('提示', '数值溢出', '⚠');
                    return;
                }
                pickPointByPh(tab, value);
            });

            // 按Enter键取点（根据输入值判断是体积还是pH）
            volumeInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    const value = parseFloat(volumeInput.value);
                    if (!Number.isFinite(value)) return;
                    if (value > 14) {
                        if (value < 0 || value > config.maxVolume) {
                            showAlert('提示', '数值溢出', '⚠');
                            return;
                        }
                        pickPointByVolume(tab, value);
                    } else {
                        if (value < 0 || value > 14) {
                            showAlert('提示', '数值溢出', '⚠');
                            return;
                        }
                        pickPointByPh(tab, value);
                    }
                }
            });
            
            // 曲线选择菜单（多曲线模式）
            if (curvePickToggle && curvePickMenu) {
                curvePickToggle.addEventListener('click', () => {
                    curvePickMenu.classList.toggle('active');
                });
                document.addEventListener('click', (event) => {
                    if (!curvePickMenu.contains(event.target) && event.target !== curvePickToggle) {
                        curvePickMenu.classList.remove('active');
                    }
                });
                updateCurvePickMenu(tab);
            }

            // 当量体积输入框 - 实时更新pH突变范围
            const eqVolumeInput = pane.querySelector('#equivalenceVolume');
            if (eqVolumeInput) {
                eqVolumeInput.addEventListener('input', function() {
                    if (tab.volumes && tab.phs && tab.volumes.length > 0) {
                        updateStats(tab, tab.volumes, tab.phs);
                    }
                });
            }

            // 多曲线模式的曲线可见性列表
            if (tab.type === 'multi') {
                updateCurveVisibilityList(tab);
            }
            
            // 设置画布交互
            setupCanvasInteractions(tab, canvas);

            // 初始化指示剂面板
            initIndicatorPanel(pane);
        }

        function setupCanvasInteractions(tab, canvas) {
            if (!canvas) return;
            if (canvas.dataset.listenersAttached === 'true') return;
            attachHoldListeners(canvas, tab);
            attachHoverPreview(canvas, tab);
            canvas.dataset.listenersAttached = 'true';
        }

        function addFixedMark(tab, point) {
            if (!tab || !point) return;
            const keyBase = tab.type === 'multi'
                ? `m-${point.curveName || point.datasetIndex}-${point.volume.toFixed(3)}`
                : `s-${point.volume.toFixed(3)}`;
            const key = point.markKey || keyBase;
            if (tab.fixedMarks.find(mark => mark.key === key)) return;
            tab.fixedMarks.push({
                key,
                datasetIndex: point.datasetIndex,
                index: point.index,
                label: point.label ?? point.volume.toFixed(2),
                volume: point.volume,
                ph: point.ph,
                color: point.color,
                curveName: point.curveName
            });
            refreshTabAnnotations(tab);
        }

        function attachHoverPreview(canvas, tab) {
            const preview = document.getElementById('hoverPreview');
            if (!preview) return;
            const hide = () => {
                preview.classList.remove('active');
                if (tab) {
                    tab.selectedPoint = null;
                    tab.hoverPreviewKey = null;
                    refreshTabAnnotations(tab);
                }
            };
            const makeKey = (point) => `${point.datasetIndex}|${point.index}`;
            const resolveCurveData = (point) => {
                if (!point) return null;
                if (tab.type === 'single') {
                    return { volumes: tab.volumes, phs: tab.phs, maxVolume: config.maxVolume };
                }
                const curve = savedCurves.find(item => item.name === point.curveName);
                if (!curve) return null;
                const maxVolume = curve.volumes.length ? curve.volumes[curve.volumes.length - 1] : config.maxVolume;
                return { volumes: curve.volumes, phs: curve.phs, maxVolume };
            };
            const show = (event, point) => {
                const curveData = resolveCurveData(point);
                const progress = curveData ? ((point.volume / curveData.maxVolume) * 100).toFixed(1) : '--';
                const bufferIndex = curveData ? getBufferIndexForCurve(curveData.volumes, curveData.phs, point.volume).toFixed(2) : '--';
                const nameLine = tab.type === 'multi' && point.curveName ? `<div class="hover-preview-title">${point.curveName}</div>` : '';
                preview.innerHTML = `
                    ${nameLine}
                    <div class="hover-preview-row"><span>体积</span><span>${point.volume.toFixed(2)} mL</span></div>
                    <div class="hover-preview-row"><span>pH</span><span>${point.ph.toFixed(2)}</span></div>
                    <div class="hover-preview-row"><span>体积进度</span><span>${progress}%</span></div>
                    <div class="hover-preview-row"><span>缓冲容量</span><span>${bufferIndex}</span></div>
                `;
                const pad = 8;
                const targetLeft = event.clientX + 14;
                const targetTop = event.clientY + 12;
                preview.style.left = `${targetLeft}px`;
                preview.style.top = `${targetTop}px`;
                preview.classList.add('active');
                const w = preview.offsetWidth || 180;
                const h = preview.offsetHeight || 100;
                const clampedLeft = Math.min(targetLeft, window.innerWidth - w - pad);
                const clampedTop = Math.min(targetTop, window.innerHeight - h - pad);
                preview.style.left = `${Math.max(pad, clampedLeft)}px`;
                preview.style.top = `${Math.max(pad, clampedTop)}px`;
                const key = makeKey(point);
                if (tab.hoverPreviewKey !== key) {
                    tab.hoverPreviewKey = key;
                    tab.selectedPoint = point;
                    refreshTabAnnotations(tab);
                }
            };
            const move = (event) => {
                if (!tab || !tab.chart) {
                    hide();
                    canvas.style.cursor = 'default';
                    return;
                }
                if (dragState.active) {
                    return;
                }
                const point = getPointFromEvent(tab.chart, event, true);
                const mark = findFixedMarkAtPosition(tab, tab.chart, event);
                if (!point && !mark) {
                    hide();
                    canvas.style.cursor = 'default';
                    return;
                }
                if (mark) {
                    hide();
                    canvas.style.cursor = 'grab';
                    return;
                }
                canvas.style.cursor = 'crosshair';
                show(event, point);
            };
            const leave = () => {
                hide();
                canvas.style.cursor = 'default';
            };
            canvas.addEventListener('mousemove', move);
            canvas.addEventListener('mouseleave', leave);
        }

        function interpolatePointByPh(points, ph) {
            if (!points || points.length < 2) return null;
            let closestIndex = 0;
            let minDiff = Math.abs(points[0].y - ph);
            for (let i = 1; i < points.length; i++) {
                const diff = Math.abs(points[i].y - ph);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestIndex = i;
                }
            }
            if (closestIndex === 0) {
                const p0 = points[0];
                const p1 = points[1];
                const range = p1.y - p0.y;
                if (range === 0) return { volume: p0.x, ph: p0.y, index: 0 };
                const t = (ph - p0.y) / range;
                const volume = p0.x + (p1.x - p0.x) * t;
                return { volume, ph, index: 0 };
            }
            if (closestIndex === points.length - 1) {
                const p0 = points[closestIndex - 1];
                const p1 = points[closestIndex];
                const range = p1.y - p0.y;
                if (range === 0) return { volume: p1.x, ph: p1.y, index: closestIndex };
                const t = (ph - p0.y) / range;
                const volume = p0.x + (p1.x - p0.x) * t;
                return { volume, ph, index: closestIndex - 1 };
            }
            const p0 = points[closestIndex - 1];
            const p1 = points[closestIndex];
            const range = p1.y - p0.y;
            if (range === 0) return { volume: p0.x, ph: p0.y, index: closestIndex - 1 };
            const t = (ph - p0.y) / range;
            const volume = p0.x + (p1.x - p0.x) * t;
            return { volume, ph, index: closestIndex - 1 };
        }

        /**
         * 更新一阶导数图表
         * 功能：计算并绘制滴定曲线的一阶导数图
         * 算法：
         * 1. 使用中心差分法计算一阶导数：d(pH)/d(V)（提高精度）
         * 2. 生成导数数据点
         * 3. 使用Chart.js绘制导数曲线
         * 
         * 导数曲线的意义：
         * - 导数最大值对应滴定曲线的拐点（当量点）
         * - 对于二元酸滴定，应出现两个尖峰，分别对应两个化学计量点
         * - 中心差分法比前向差分法精度更高，能更好地区分相邻的滴定终点
         */
        function updateDerivativeChart(tab, volumes, phs, color, style) {
            if (!tab) return;
            const pane = getTabContent(tab);
            if (!pane) return;
            const canvas = pane.querySelector('[data-role="derivative-chart-canvas"]');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const themeColors = getThemeColors();
            const chartLabels = getChartLabels();
            const isPaperStyle = chartStyle === 'paper';
            const isDarkTheme = document.documentElement.getAttribute('data-theme') === 'dark';
            
            // 计算颜色配置
            const natureColors = isPaperStyle ? {
                line: '#ff6b6b',
                fill: 'transparent',
                grid: isDarkTheme ? 'rgba(255, 255, 255, 0.18)' : '#e5e5e5',
                text: isDarkTheme ? '#e5e7eb' : '#000000',
                textSecondary: isDarkTheme ? '#cbd5e1' : '#666666',
                background: isDarkTheme ? '#0b1220' : '#ffffff'
            } : {
                line: '#ff6b6b',
                fill: color + '10',
                grid: themeColors.gridColor,
                text: themeColors.textPrimary,
                textSecondary: themeColors.textSecondary,
                background: '#ffffff'
            };

            // 清理旧图表
            cancelHold();
            if (tab.derivativeChart) {
                tab.derivativeChart.destroy();
            }

            // 计算一阶导数 - 使用中心差分法提高精度
            const derivativeVolumes = [];
            const derivativeValues = [];
            
            // 处理第一个点（前向差分）
            if (volumes.length > 1 && volumes[1] - volumes[0] > 0) {
                const derivative = (phs[1] - phs[0]) / (volumes[1] - volumes[0]);
                derivativeVolumes.push(volumes[0]);
                derivativeValues.push(derivative);
            }
            
            // 中间点使用中心差分法
            for (let i = 1; i < volumes.length - 1; i++) {
                const deltaV = volumes[i + 1] - volumes[i - 1];
                if (deltaV > 0) {
                    const derivative = (phs[i + 1] - phs[i - 1]) / deltaV;
                    derivativeVolumes.push(volumes[i]);
                    derivativeValues.push(derivative);
                }
            }
            
            // 处理最后一个点（后向差分）
            if (volumes.length > 1 && volumes[volumes.length - 1] - volumes[volumes.length - 2] > 0) {
                const derivative = (phs[volumes.length - 1] - phs[volumes.length - 2]) / 
                                 (volumes[volumes.length - 1] - volumes[volumes.length - 2]);
                derivativeVolumes.push(volumes[volumes.length - 1]);
                derivativeValues.push(derivative);
            }

            // 计算像素比以提高图表质量
            const pixelRatio = Math.max(window.devicePixelRatio || 1, isPaperStyle ? 2 : 1);

            // 准备数据点
            const datasetPoints = derivativeVolumes.map((v, idx) => ({ x: v, y: derivativeValues[idx] }));
            
            // 创建导数图表
            tab.derivativeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: '一阶导数 d(pH)/d(V)',
                            data: datasetPoints,
                            borderColor: natureColors.line,
                            backgroundColor: natureColors.fill,
                            fill: !isPaperStyle,
                            tension: isPaperStyle ? 0.25 : 0.4,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            pointHitRadius: 6,
                            borderWidth: isPaperStyle ? 1.5 : 2,
                            borderJoinStyle: 'round',
                            borderCapStyle: 'round'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    devicePixelRatio: pixelRatio,
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    },
                    plugins: {
                        legend: {
                            display: !isPaperStyle,
                            position: 'top',
                            labels: {
                                color: natureColors.text,
                                font: { size: 12 },
                                boxWidth: 12,
                                padding: 20
                            }
                        },
                        tooltip: { enabled: false },
                        annotation: { annotations: {} }
                    },
                    onClick: null,
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: chartLabels.xSingle,
                                color: natureColors.text,
                                font: { size: isPaperStyle ? 18 : 12, weight: '600' }
                            },
                            ticks: {
                                color: natureColors.textSecondary,
                                font: { size: isPaperStyle ? 16 : 11 }
                            },
                            grid: {
                                color: natureColors.grid,
                                drawBorder: true,
                                lineWidth: 1
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'd(pH)/d(V)',
                                color: natureColors.text,
                                font: { size: isPaperStyle ? 18 : 12, weight: '600' }
                            },
                            ticks: {
                                color: natureColors.textSecondary,
                                font: { size: isPaperStyle ? 16 : 11 }
                            },
                            grid: {
                                color: natureColors.grid,
                                drawBorder: true,
                                lineWidth: 1
                            }
                        }
                    }
                }
            });
        }

                borderWidth: isPaperStyle ? 1.5 : 2,
                borderJoinStyle: 'round',
                borderCapStyle: 'round',
                borderDash: curve.style === 'dashed' ? [10, 5] : (curve.style === 'dotted' ? [3, 3] : (curve.style === 'dashdot' ? [10, 3, 3, 3] : []))
            }));

            tab.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    devicePixelRatio: pixelRatio,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: natureColors.text,
                                boxWidth: 12,
                                font: { size: isPaperStyle ? 16 : 11 }
                            }
                        },
                        tooltip: { enabled: false },
                        annotation: { annotations: {} }
                    },
                    onClick: null,
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: chartLabels.xMulti,
                                color: natureColors.text,
                                font: { size: isPaperStyle ? 18 : 12, weight: '600' }
                            },
                            ticks: { color: natureColors.textSecondary, font: { size: isPaperStyle ? 16 : 11 } },
                            grid: { color: natureColors.grid, drawBorder: true }
                        },
                        y: {
                            title: {
                                display: true,
                                text: chartLabels.y,
                                color: natureColors.text,
                                font: { size: isPaperStyle ? 18 : 12, weight: '600' }
                            },
                            min: 0,
                            max: 14,
                            ticks: { color: natureColors.textSecondary, font: { size: isPaperStyle ? 16 : 11 } },
                            grid: { color: natureColors.grid, drawBorder: true }
                        }
                    }
                }
            });
            refreshTabAnnotations(tab);
        }

        // Nature论文常用配色
        function getNatureColor(index) {
            const colors = ['#000000', '#e31a1c', '#1f78b4', '#33a02c', '#ff7f00', '#6a3d9a', '#b15928'];
            return colors[index % colors.length];
        }

        function normalizeDatasetPoint(chart, dataset, index) {
            const point = dataset.data[index];
            if (point && typeof point === 'object') {
                return { volume: point.x, ph: point.y };
            }
            const label = chart.data.labels ? chart.data.labels[index] : null;
            if (label === null || label === undefined) return null;
            return { volume: parseFloat(label), ph: point };
        }

        function getDatasetPoints(chart, dataset) {
            if (!dataset || !Array.isArray(dataset.data)) return [];
            if (dataset.data.length === 0) return [];
            if (dataset.data[0] && typeof dataset.data[0] === 'object') {
                return dataset.data.map(item => ({ x: item.x, y: item.y }));
            }
            if (!chart.data.labels) return [];
            return dataset.data.map((value, index) => ({ x: parseFloat(chart.data.labels[index]), y: value }));
        }

        function interpolatePoint(points, volume) {
            if (!points || points.length < 2) return null;
            let leftIndex = -1;
            for (let i = 1; i < points.length; i++) {
                if (volume <= points[i].x) {
                    leftIndex = i - 1;
                    break;
                }
            }
            if (leftIndex < 0) return null;
            const p0 = points[leftIndex];
            const p1 = points[leftIndex + 1];
            const range = p1.x - p0.x;
            if (range === 0) return { volume, ph: p0.y, index: leftIndex };
            const t = (volume - p0.x) / range;
            const ph = p0.y + (p1.y - p0.y) * t;
            return { volume, ph, index: leftIndex };
        }

        function resampleCurve(volumes, phs, targetCount) {
            if (!Array.isArray(volumes) || !Array.isArray(phs)) return [];
            if (volumes.length < 2 || phs.length < 2) {
                return volumes.map((v, i) => ({ x: v, y: phs[i] }));
            }
            const count = Math.max(2, targetCount || volumes.length);
            const minV = volumes[0];
            const maxV = volumes[volumes.length - 1];
            if (minV === maxV) {
                return volumes.map((v, i) => ({ x: v, y: phs[i] }));
            }
            const step = (maxV - minV) / (count - 1);
            const points = volumes.map((v, i) => ({ x: v, y: phs[i] }));
            const resampled = [];
            for (let i = 0; i < count; i++) {
                const targetV = minV + step * i;
                const interpolated = interpolatePoint(points, targetV);
                if (interpolated) {
                    resampled.push({ x: targetV, y: interpolated.ph });
                }
            }
            return resampled;
        }

        function getFittedPointFromEvent(chart, event, distanceLimit = 120) {
            if (!chart) return null;
            const pos = getCanvasPosition(chart, event);
            const xValue = chart.scales.x.getValueForPixel(pos.x);
            if (!Number.isFinite(xValue)) return null;
            let best = null;
            let bestDistance = Infinity;
            chart.data.datasets.forEach((dataset, datasetIndex) => {
                const points = getDatasetPoints(chart, dataset);
                const interpolated = interpolatePoint(points, xValue);
                if (!interpolated) return;
                const xPixel = chart.scales.x.getPixelForValue(interpolated.volume);
                const yPixel = chart.scales.y.getPixelForValue(interpolated.ph);
                const distance = Math.hypot(pos.x - xPixel, pos.y - yPixel);
                if (distance < bestDistance) {
                    bestDistance = distance;
                    best = {
                        datasetIndex,
                        index: interpolated.index,
                        label: interpolated.volume,
                        volume: interpolated.volume,
                        ph: interpolated.ph,
                        color: dataset.borderColor || dataset.backgroundColor || '#58a6ff',
                        curveName: dataset.label
                    };
                }
            });
            if (!best || bestDistance > distanceLimit) return null;
            return best;
        }

        function getPointFromEvent(chart, event, allowFitted = true) {
            if (!chart) return null;
            const snapDistance = config.curveSnapDistance || 5;
            const { x: mouseX, y: mouseY } = getCanvasPosition(chart, event);
            const elements = chart.getElementsAtEventForMode(event, 'nearest', { intersect: true }, true);
            if (elements && elements.length > 0) {
                const { datasetIndex, index } = elements[0];
                const dataset = chart.data.datasets[datasetIndex];
                const normalized = normalizeDatasetPoint(chart, dataset, index);
                if (!normalized) return null;
                const pointX = chart.scales.x.getPixelForValue(normalized.volume);
                const pointY = chart.scales.y.getPixelForValue(normalized.ph);
                const distance = Math.sqrt(Math.pow(mouseX - pointX, 2) + Math.pow(mouseY - pointY, 2));
                if (distance > snapDistance) return null;
                
                let color = dataset.borderColor || dataset.backgroundColor || '#58a6ff';
                if (chartStyle === 'paper' && dataset.label) {
                    const curve = savedCurves.find(c => c.name === dataset.label);
                    if (curve && curve.color) {
                        color = curve.color;
                    }
                }
                
                return {
                    datasetIndex,
                    index,
                    label: normalized.volume,
                    volume: normalized.volume,
                    ph: normalized.ph,
                    color: color,
                    curveName: dataset.label
                };
            }
            if (!allowFitted) return null;
            return getFittedPointFromEvent(chart, event);
        }

        function getCanvasPosition(chart, event) {
            const rect = chart.canvas.getBoundingClientRect();
            const rawX = event.clientX - rect.left;
            const rawY = event.clientY - rect.top;
            const area = chart.chartArea || { left: 0, right: chart.width, top: 0, bottom: chart.height };
            const x = Math.min(Math.max(rawX, area.left + 1), area.right - 1);
            const y = Math.min(Math.max(rawY, area.top + 1), area.bottom - 1);
            return { x, y };
        }

        function getLabelLayout(chart, point, labelText, simpleLabelMode) {
            const chartArea = chart.chartArea;
            const xValue = point.volume;
            const xPixel = chart.scales.x.getPixelForValue(xValue);
            const yPixel = chart.scales.y.getPixelForValue(point.ph);
            const ctx = chart.ctx;
            ctx.save();
            const fontSize = simpleLabelMode ? 12 : 12;
            ctx.font = `${fontSize}px ${Chart.defaults.font && Chart.defaults.font.family ? Chart.defaults.font.family : 'sans-serif'}`;
            const textWidth = ctx.measureText(labelText).width;
            ctx.restore();
            const approxWidth = Math.max(simpleLabelMode ? 60 : 90, Math.ceil(textWidth) + (simpleLabelMode ? 4 : 24));
            const approxHeight = simpleLabelMode ? 18 : 26;
            const labels = chart.data.labels || [];
            const dataset = chart.data.datasets && chart.data.datasets[point.datasetIndex] ? chart.data.datasets[point.datasetIndex].data : [];
            let xAdjust = 0;
            let yAdjust = simpleLabelMode ? -26 : -38;
            const index = point.index;
            if (index > 0 && index < dataset.length - 1) {
                const prevY = dataset[index - 1];
                const nextY = dataset[index + 1];
                const prevX = parseFloat(labels[index - 1]);
                const nextX = parseFloat(labels[index + 1]);
                const slope = (nextY - prevY) / ((nextX - prevX) || 1);
                if (Math.abs(slope) > 0.6) {
                    xAdjust = slope > 0 ? 22 : -22;
                }
            }
            const topSpace = yPixel - chartArea.top;
            if (topSpace < approxHeight + 10) {
                yAdjust = simpleLabelMode ? 18 : 32;
            }
            const left = xPixel + xAdjust - approxWidth / 2;
            const right = xPixel + xAdjust + approxWidth / 2;
            if (left < chartArea.left + 14) {
                xAdjust += chartArea.left + 14 - left;
            } else if (right > chartArea.right - 6) {
                xAdjust += chartArea.right - 6 - right;
            }
            const top = yPixel - approxHeight + yAdjust;
            const bottom = yPixel + yAdjust;
            if (top < chartArea.top + 6) {
                yAdjust = chartArea.top + 6 - (yPixel - approxHeight);
            } else if (bottom > chartArea.bottom - 6) {
                yAdjust = chartArea.bottom - 6 - yPixel;
            }
            return { xAdjust, yAdjust, approxWidth, approxHeight, xPixel, yPixel };
        }

        function buildAnnotationEntriesWithLayout(chart, point, keyPrefix, simpleLabelMode, layout, showLabel = true, customOffset = null) {
            const isPaperStyle = chartStyle === 'paper';
            const isDarkTheme = document.documentElement.getAttribute('data-theme') === 'dark';
            const labelColor = isPaperStyle ? (isDarkTheme ? '#f8fafc' : '#000000') : point.color;
            const bgColor = isPaperStyle ? (isDarkTheme ? 'rgba(15, 23, 42, 0.75)' : 'rgba(255,255,255,0.85)') : point.color + 'b3';
            const textColor = isPaperStyle ? (isDarkTheme ? '#f8fafc' : '#000000') : '#ffffff';
            const borderColor = isPaperStyle ? (isDarkTheme ? 'rgba(248, 250, 252, 0.6)' : 'rgba(0,0,0,0.6)') : point.color;
            const labelText = `(${point.volume.toFixed(2)}, ${point.ph.toFixed(2)})`;
            const xValue = point.label ?? point.volume.toFixed(2);
            
            const finalOffset = customOffset || { xAdjust: layout.xAdjust, yAdjust: layout.yAdjust };
            
            const labelConfig = {
                type: 'label',
                xValue: xValue,
                yValue: point.ph,
                backgroundColor: simpleLabelMode ? 'transparent' : bgColor,
                borderColor: simpleLabelMode ? 'transparent' : borderColor,
                borderWidth: simpleLabelMode ? 0 : (isPaperStyle ? 1 : 1.5),
                borderRadius: simpleLabelMode ? 0 : (isPaperStyle ? 6 : 8),
                content: labelText,
                font: { size: isPaperStyle ? 15 : 12, weight: '600' },
                color: simpleLabelMode ? labelColor : textColor,
                padding: simpleLabelMode ? { top: 0, bottom: 0, left: 0, right: 0 } : { top: 6, bottom: 6, left: 12, right: 12 },
                xAdjust: finalOffset.xAdjust,
                yAdjust: finalOffset.yAdjust,
                enabled: true,
                position: 'center'
            };
            
            const pointConfig = {
                type: 'point',
                xValue: xValue,
                yValue: point.ph,
                backgroundColor: point.color + 'ff',
                borderColor: '#ffffff',
                borderWidth: 2,
                radius: 6,
                enabled: true
            };
            
            const entries = {};
            entries[`${keyPrefix}Point`] = pointConfig;
            if (showLabel) {
                entries[`${keyPrefix}Label`] = labelConfig;
            }
            return entries;
        }

        function buildAnnotationEntries(chart, point, keyPrefix, simpleLabelMode) {
            const labelText = `(${point.volume.toFixed(2)}, ${point.ph.toFixed(2)})`;
            const layout = getLabelLayout(chart, point, labelText, simpleLabelMode);
            return buildAnnotationEntriesWithLayout(chart, point, keyPrefix, simpleLabelMode, layout);
        }

        function avoidLabelCollisions(chart, labelLayouts, simpleLabelMode) {
            const chartArea = chart.chartArea;
            const adjustedLayouts = JSON.parse(JSON.stringify(labelLayouts));
            const collisionBuffer = 8;
            
            // 计算每个标签的边界框
            adjustedLayouts.forEach(item => {
                const layout = item.layout;
                item.bounds = {
                    left: layout.xPixel + layout.xAdjust - layout.approxWidth / 2,
                    right: layout.xPixel + layout.xAdjust + layout.approxWidth / 2,
                    top: layout.yPixel + layout.yAdjust - layout.approxHeight,
                    bottom: layout.yPixel + layout.yAdjust
                };
            });
            
            // 碰撞检测和调整
            const iterations = 5;
            for (let iter = 0; iter < iterations; iter++) {
                let collisions = false;
                
                for (let i = 0; i < adjustedLayouts.length; i++) {
                    for (let j = i + 1; j < adjustedLayouts.length; j++) {
                        const item1 = adjustedLayouts[i];
                        const item2 = adjustedLayouts[j];
                        
                        // 检查是否碰撞
                        const overlapX = item1.bounds.right + collisionBuffer > item2.bounds.left && item1.bounds.left < item2.bounds.right + collisionBuffer;
                        const overlapY = item1.bounds.bottom + collisionBuffer > item2.bounds.top && item1.bounds.top < item2.bounds.bottom + collisionBuffer;
                        
                        if (overlapX && overlapY) {
                            collisions = true;
                            
                            // 计算碰撞方向
                            const dx = item1.layout.xPixel - item2.layout.xPixel;
                            const dy = item1.layout.yPixel - item2.layout.yPixel;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            
                            // 优先调整非选中点
                            if (item1.isSelected) {
                                adjustLabelPosition(item2, dx, dy, distance, chartArea, simpleLabelMode);
                            } else if (item2.isSelected) {
                                adjustLabelPosition(item1, -dx, -dy, distance, chartArea, simpleLabelMode);
                            } else {
                                // 两个都是固定点，分别向相反方向调整
                                adjustLabelPosition(item1, dx, dy, distance, chartArea, simpleLabelMode);
                                adjustLabelPosition(item2, -dx, -dy, distance, chartArea, simpleLabelMode);
                            }
                        }
                    }
                }
                
                if (!collisions) break;
            }
            
            return adjustedLayouts;
        }

        function adjustLabelPosition(item, dx, dy, distance, chartArea, simpleLabelMode) {
            const layout = item.layout;
            const moveDistance = simpleLabelMode ? 15 : 25;
            
            // 计算移动方向
            const moveX = distance > 0 ? (dx / distance) * moveDistance : moveDistance;
            const moveY = distance > 0 ? (dy / distance) * moveDistance : moveDistance;
            
            // 调整位置
            layout.xAdjust += moveX;
            layout.yAdjust += moveY;
            
            // 确保不超出图表区域
            const left = layout.xPixel + layout.xAdjust - layout.approxWidth / 2;
            const right = layout.xPixel + layout.xAdjust + layout.approxWidth / 2;
            const top = layout.yPixel + layout.yAdjust - layout.approxHeight;
            const bottom = layout.yPixel + layout.yAdjust;
            
            if (left < chartArea.left + 6) {
                layout.xAdjust += chartArea.left + 6 - left;
            }
            if (right > chartArea.right - 6) {
                layout.xAdjust += chartArea.right - 6 - right;
            }
            if (top < chartArea.top + 6) {
                layout.yAdjust += chartArea.top + 6 - top;
            }
            if (bottom > chartArea.bottom - 6) {
                layout.yAdjust += chartArea.bottom - 6 - bottom;
            }
            
            // 更新边界框
            item.bounds = {
                left: layout.xPixel + layout.xAdjust - layout.approxWidth / 2,
                right: layout.xPixel + layout.xAdjust + layout.approxWidth / 2,
                top: layout.yPixel + layout.yAdjust - layout.approxHeight,
                bottom: layout.yPixel + layout.yAdjust
            };
        }

        function applyChartAnnotations(chart, selectedPoint, fixedPoints, simpleLabelMode, showLabel, labelCustomPositions = {}) {
            if (!chart || !chart.options.plugins.annotation) return;
            const annotations = {};
            const allPoints = [];
            if (selectedPoint) {
                allPoints.push(selectedPoint);
            }
            fixedPoints.forEach((point, idx) => {
                allPoints.push(point);
            });
            
            if (showLabel) {
                // 计算所有标签的初始位置
                const labelLayouts = [];
                allPoints.forEach((point, idx) => {
                    const labelText = `(${point.volume.toFixed(2)}, ${point.ph.toFixed(2)})`;
                    const layout = getLabelLayout(chart, point, labelText, simpleLabelMode);
                    labelLayouts.push({ point, layout, idx, isSelected: idx === 0 && selectedPoint });
                });
                
                // 碰撞检测和调整
                const adjustedLayouts = avoidLabelCollisions(chart, labelLayouts, simpleLabelMode);
                
                // 构建最终的注释
                adjustedLayouts.forEach(({ point, layout, idx, isSelected }) => {
                    const keyPrefix = isSelected ? 'selected' : `fixed_${idx - (selectedPoint ? 1 : 0)}`;
                    const customOffset = labelCustomPositions[keyPrefix];
                    Object.assign(annotations, buildAnnotationEntriesWithLayout(chart, point, keyPrefix, simpleLabelMode, layout, showLabel, customOffset));
                });
            } else {
                // 只显示点标记，不显示标签
                allPoints.forEach((point, idx) => {
                    const isSelected = idx === 0 && selectedPoint;
                    const keyPrefix = isSelected ? 'selected' : `fixed_${idx - (selectedPoint ? 1 : 0)}`;
                    const xValue = point.label ?? point.volume.toFixed(2);
                    
                    const pointConfig = {
                        type: 'point',
                        xValue: xValue,
                        yValue: point.ph,
                        backgroundColor: point.color + 'ff',
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        radius: 6,
                        enabled: true
                    };
                    
                    annotations[`${keyPrefix}Point`] = pointConfig;
                });
            }
            
            chart.options.plugins.annotation.annotations = annotations;
            chart.update('none');
        }

        function refreshTabAnnotations(tab) {
            if (!tab || !tab.chart) return;
            applyChartAnnotations(tab.chart, tab.selectedPoint, tab.fixedMarks, tab.simpleLabelMode, tab.showLabel, tab.labelCustomPositions);
        }

        function updatePointAnnotation(tab, point) {
            if (!tab || !point) return;
            tab.selectedPoint = point;
            refreshTabAnnotations(tab);
        }

        function toggleFixedMark(tab, point) {
            if (!tab || !point) return;
            const keyBase = tab.type === 'multi'
                ? `m-${point.curveName || point.datasetIndex}-${point.volume.toFixed(3)}`
                : `s-${point.volume.toFixed(3)}`;
            const key = point.markKey || keyBase;
            const existingIndex = tab.fixedMarks.findIndex(mark => mark.key === key);
            if (existingIndex !== -1) {
                tab.fixedMarks.splice(existingIndex, 1);
            } else {
                tab.fixedMarks.push({
                    key,
                    datasetIndex: point.datasetIndex,
                    index: point.index,
                    label: point.label ?? point.volume.toFixed(2),
                    volume: point.volume,
                    ph: point.ph,
                    color: point.color,
                    curveName: point.curveName
                });
            }
            refreshTabAnnotations(tab);
        }

        function clearAllMarks(tab) {
            if (!tab) return;
            tab.fixedMarks = [];
            tab.selectedPoint = null;
            refreshTabAnnotations(tab);
        }

        function findFixedMarkAtPosition(tab, chart, event) {
            const pos = getCanvasPosition(chart, event);
            const points = tab.fixedMarks || [];
            const allPoints = [];
            if (tab.selectedPoint) {
                allPoints.push({ ...tab.selectedPoint, isSelected: true, key: 'selected' });
            }
            points.forEach((point, idx) => {
                allPoints.push({ ...point, isSelected: false, key: `fixed_${idx}` });
            });
            for (const point of allPoints) {
                const labelText = `(${point.volume.toFixed(2)}, ${point.ph.toFixed(2)})`;
                const layout = getLabelLayout(chart, point, labelText, tab.simpleLabelMode);
                const customOffset = tab.labelCustomPositions && tab.labelCustomPositions[point.key];
                const finalXAdjust = customOffset ? customOffset.xAdjust : layout.xAdjust;
                const finalYAdjust = customOffset ? customOffset.yAdjust : layout.yAdjust;
                const left = layout.xPixel + finalXAdjust - layout.approxWidth / 2;
                const right = left + layout.approxWidth;
                const top = layout.yPixel - layout.approxHeight + finalYAdjust;
                const bottom = top + layout.approxHeight;
                if (pos.x >= left && pos.x <= right && pos.y >= top && pos.y <= bottom) {
                    return { ...point, markKey: point.key, layout: { ...layout, xAdjust: finalXAdjust, yAdjust: finalYAdjust } };
                }
            }
            return null;
        }

        const dragState = {
            active: false,
            tabId: null,
            markKey: null,
            startX: 0,
            startY: 0,
            startXAdjust: 0,
            startYAdjust: 0,
            layout: null
        };

        function startDrag(event, tab, mark) {
            if (!tab || !tab.chart || !mark) return;
            dragState.active = true;
            dragState.tabId = tab.id;
            dragState.markKey = mark.markKey;
            dragState.startX = event.clientX;
            dragState.startY = event.clientY;
            dragState.startXAdjust = mark.layout.xAdjust;
            dragState.startYAdjust = mark.layout.yAdjust;
            dragState.layout = mark.layout;
            tab.chart.canvas.style.cursor = 'grabbing';
        }

        function doDrag(event, tab) {
            if (!dragState.active || dragState.tabId !== tab.id || !dragState.layout) return;
            const dx = event.clientX - dragState.startX;
            const dy = event.clientY - dragState.startY;
            let newXAdjust = dragState.startXAdjust + dx;
            let newYAdjust = dragState.startYAdjust + dy;
            
            const chartArea = tab.chart.chartArea;
            const approxWidth = 90;
            const approxHeight = 26;
            
            const left = dragState.layout.xPixel + newXAdjust - approxWidth / 2;
            const right = left + approxWidth;
            const top = dragState.layout.yPixel - approxHeight + newYAdjust;
            const bottom = top + approxHeight;
            
            if (left < chartArea.left + 6) {
                newXAdjust += chartArea.left + 6 - left;
            }
            if (right > chartArea.right - 6) {
                newXAdjust += chartArea.right - 6 - right;
            }
            if (top < chartArea.top + 6) {
                newYAdjust += chartArea.top + 6 - top;
            }
            if (bottom > chartArea.bottom - 6) {
                newYAdjust += chartArea.bottom - 6 - bottom;
            }
            
            if (!tab.labelCustomPositions) tab.labelCustomPositions = {};
            tab.labelCustomPositions[dragState.markKey] = { xAdjust: newXAdjust, yAdjust: newYAdjust };
            refreshTabAnnotations(tab);
        }

        function endDrag(tab) {
            if (!dragState.active) return;
            dragState.active = false;
            if (tab && tab.chart) {
                tab.chart.canvas.style.cursor = 'default';
            }
        }

        function showHoldProgress(x, y) {
            const progress = document.getElementById('holdProgress');
            if (!progress) return;
            progress.style.display = 'block';
            progress.style.left = `${x}px`;
            progress.style.top = `${y}px`;
        }

        function updateHoldProgress(percent) {
            const progress = document.getElementById('holdProgress');
            if (!progress) return;
            const clamped = Math.max(0, Math.min(1, percent));
            const deg = clamped * 360;
            progress.style.background = `conic-gradient(var(--accent-primary) ${deg}deg, rgba(148, 163, 184, 0.2) ${deg}deg)`;
        }

        function hideHoldProgress() {
            const progress = document.getElementById('holdProgress');
            if (!progress) return;
            progress.style.display = 'none';
        }

        function cancelHold() {
            if (holdState.timer) {
                clearTimeout(holdState.timer);
            }
            if (holdState.raf) {
                cancelAnimationFrame(holdState.raf);
            }
            holdState.active = false;
            holdState.timer = null;
            holdState.raf = null;
            holdState.point = null;
            hideHoldProgress();
        }

        function startHold(event, tab) {
            if (!tab || !tab.chart) return;
            const point = getPointFromEvent(tab.chart, event) || findFixedMarkAtPosition(tab, tab.chart, event);
            if (!point) return;
            cancelHold();
            holdState.active = true;
            holdState.startTime = performance.now();
            holdState.tabId = tab.id;
            holdState.point = point;
            showHoldProgress(event.clientX, event.clientY);
            const duration = 700;
            holdState.timer = setTimeout(() => {
                if (!holdState.active) return;
                toggleFixedMark(tab, point);
                cancelHold();
            }, duration);
            const tick = () => {
                if (!holdState.active) return;
                const elapsed = performance.now() - holdState.startTime;
                updateHoldProgress(elapsed / duration);
                holdState.raf = requestAnimationFrame(tick);
            };
            holdState.raf = requestAnimationFrame(tick);
        }

        function attachHoldListeners(canvas, tab) {
            if (!canvas) return;
            const start = (event) => {
                if (event.button !== undefined && event.button !== 0) return;
                const mark = findFixedMarkAtPosition(tab, tab.chart, event);
                if (mark) {
                    cancelHold();
                    startDrag(event, tab, mark);
                } else {
                    startHold(event, tab);
                }
            };
            const move = (event) => {
                if (dragState.active) {
                    doDrag(event, tab);
                    return;
                }
                if (!holdState.active) return;
                showHoldProgress(event.clientX, event.clientY);
            };
            const stop = () => {
                cancelHold();
                endDrag(tab);
            };
            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', move);
            canvas.addEventListener('pointerup', stop);
            canvas.addEventListener('pointerleave', stop);
            canvas.addEventListener('pointercancel', stop);
            canvas.addEventListener('contextmenu', (event) => event.preventDefault());
        }

        function getBufferIndexForCurve(volumes, phs, volume) {
            if (!volumes || !phs || volumes.length < 3) return 0;
            let nearestIndex = 0;
            let bestDistance = Infinity;
            volumes.forEach((v, idx) => {
                const dist = Math.abs(v - volume);
                if (dist < bestDistance) {
                    bestDistance = dist;
                    nearestIndex = idx;
                }
            });
            if (nearestIndex > 0 && nearestIndex < phs.length - 1) {
                const prevDerivative = Math.abs(phs[nearestIndex] - phs[nearestIndex - 1]) / (volumes[nearestIndex] - volumes[nearestIndex - 1]);
                const nextDerivative = Math.abs(phs[nearestIndex + 1] - phs[nearestIndex]) / (volumes[nearestIndex + 1] - volumes[nearestIndex]);
                return 1 / ((prevDerivative + nextDerivative) / 2);
            }
            return 0;
        }

        function showPointInfo(tab, volume, ph) {

            const bufferIndex = getBufferIndexForCurve(tab.volumes, tab.phs, volume);
            if (bufferEl) bufferEl.textContent = bufferIndex.toFixed(2);

        function getChartBackgroundColor() {
            const theme = document.documentElement.getAttribute('data-theme');
            return theme === 'dark' ? '#0b1220' : '#ffffff';
        }

        function exportChartImage(chart, format, scale, filename) {
            if (!chart) return;
            const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
            const baseRatio = chart.options.devicePixelRatio || window.devicePixelRatio || 1;
            const targetRatio = Math.max(baseRatio * scale, 1);
            chart.options.devicePixelRatio = targetRatio;
            chart.resize();
            chart.update('none');

            const canvas = chart.canvas;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = getChartBackgroundColor();
            tempCtx.fillRect(0, 0, canvas.width, canvas.height);
            tempCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = filename;
            link.href = tempCanvas.toDataURL(mimeType, 1.0);
            link.click();

            chart.options.devicePixelRatio = baseRatio;
            chart.resize();
            chart.update('none');
        }

        function hexToRGBTuple(hex) {
            const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (!m) return [88, 166, 255];
            return [parseInt(m[1], 16), parseInt(m[2], 16), parseInt(m[3], 16)];
        }

        function buildMathematicaMarks(tab, curveName, colorStr) {
            if (!tab) return '';
            const items = [];
            const pushPoint = (point) => {
                if (!point || !Number.isFinite(point.volume) || !Number.isFinite(point.ph)) return;
                const nameMatch = curveName ? point.curveName === curveName : true;
                if (!nameMatch) return;
                const key = `${point.datasetIndex ?? 's'}-${point.volume.toFixed(3)}`;
                if (items.find(item => item.key === key)) return;
                items.push({
                    key,
                    volume: point.volume,
                    ph: point.ph,
                    label: `(${point.volume.toFixed(2)}, ${point.ph.toFixed(2)})`
                });
            };
            if (Array.isArray(tab.fixedMarks)) {
                tab.fixedMarks.forEach(mark => pushPoint(mark));
            }
            if (tab.selectedPoint) {
                pushPoint(tab.selectedPoint);
            }
            if (items.length === 0) return '';
            const points = items.map(item => `{${item.volume.toFixed(4)}, ${item.ph.toFixed(4)}}`).join(', ');
            const labels = items.map(item => `Text[Style["${item.label}", 11, ${colorStr}], {${item.volume.toFixed(4)}, ${item.ph.toFixed(4)}}, {1, -1}]`).join(', ');
            return `Epilog -> {${colorStr}, PointSize[0.015], Point[{${points}}], ${labels}}`;
        }

        function buildMathematicaMarksForCurves(tab, curves) {
            if (!tab || !Array.isArray(curves) || curves.length === 0) return '';
            const epilogParts = [];
            curves.forEach((curve, idx) => {
                const items = [];
                const pushPoint = (point) => {
                    if (!point || !Number.isFinite(point.volume) || !Number.isFinite(point.ph)) return;
                    const nameMatch = point.curveName === curve.name;
                    if (!nameMatch) return;
                    const key = `${point.datasetIndex ?? 's'}-${point.volume.toFixed(3)}`;
                    if (items.find(item => item.key === key)) return;
                    items.push({
                        key,
                        volume: point.volume,
                        ph: point.ph,
                        label: `(${point.volume.toFixed(2)}, ${point.ph.toFixed(2)})`
                    });
                };
                if (Array.isArray(tab.fixedMarks)) {
                    tab.fixedMarks.forEach(mark => pushPoint(mark));
                }
                if (tab.selectedPoint && tab.selectedPoint.curveName === curve.name) {
                    pushPoint(tab.selectedPoint);
                }
                if (items.length > 0) {
                    const rgb = hexToRGBTuple(curve.color || curve.params?.curveColor || '#58a6ff');
                    const colorStr = `RGBColor[${(rgb[0] / 255).toFixed(3)}, ${(rgb[1] / 255).toFixed(3)}, ${(rgb[2] / 255).toFixed(3)}]`;
                    const points = items.map(item => `{${item.volume.toFixed(4)}, ${item.ph.toFixed(4)}}`).join(', ');
                    const labels = items.map(item => `Text[Style["${item.label}", 11, ${colorStr}], {${item.volume.toFixed(4)}, ${item.ph.toFixed(4)}}, {1, -1}]`).join(', ');
                    epilogParts.push(`${colorStr}, PointSize[0.015], Point[{${points}}], ${labels}`);
                }
            });
            if (epilogParts.length === 0) return '';
            return `Epilog -> {${epilogParts.join(', ')}}`;
        }

        function buildMathematicaCodeFromCurve(curve, tab) {
            if (curve.params) {
                const cfg = Object.assign({}, curve.params, { curveColor: curve.color || curve.params.curveColor });
                return buildMathematicaCodeFromConfig(cfg, tab, curve.name);
            }
            const rgb = hexToRGBTuple(curve.color || '#58a6ff');
            const maxV = curve.volumes.length ? curve.volumes[curve.volumes.length - 1] : (config.maxVolume || 100);
            const pts = curve.volumes.map((v, i) => `{${v.toFixed(4)}, ${curve.phs[i].toFixed(4)}}`).join(', ');
            const colorStr = `RGBColor[${(rgb[0]/255).toFixed(3)}, ${(rgb[1]/255).toFixed(3)}, ${(rgb[2]/255).toFixed(3)}]`;
            const epilog = buildMathematicaMarks(tab, curve.name, colorStr);
            return `Module[{data, color},
  data = {${pts}};
  color = ${colorStr};
  ListLinePlot[data,
    PlotRange -> {{0, ${maxV.toFixed(4)}}, {0, 14}},
    PlotStyle -> Directive[color, Thick],
    AxesLabel -> {"V (mL)", "pH"},
    ImageSize -> Large,
    GridLines -> Automatic,
    GridLinesStyle -> Directive[GrayLevel[0.8, 0.3]]${epilog ? `,\n    ${epilog}` : ''}
  ]
]`;
        }

        function buildMathematicaCodeFromCurves(curves, tab) {
            const validCurves = Array.isArray(curves) ? curves.filter(curve => curve && curve.params) : [];
            if (!validCurves.length) return '';
            const safeName = (name) => (name || '曲线').replace(/"/g, '\\"');
            const dataDefs = validCurves.map((curve, idx) => {
                const localMax = Number.isFinite(curve.params.maxVolume) ? curve.params.maxVolume : (config.maxVolume || 0);
                const sampleCount = Number.isFinite(curve.params.sampleCount) ? curve.params.sampleCount : (config.sampleCount || 1000);
                const step = sampleCount ? localMax / sampleCount : (localMax / 1000);
                const solveBlock = buildMathematicaSolveBlock(curve.params);
                return `data${idx + 1} = Table[{V, ${solveBlock}}, {V, 0, ${localMax}, ${step}}]`;
            });
            const colorDefs = validCurves.map((curve, idx) => {
                const rgb = hexToRGBTuple(curve.color || curve.params.curveColor || '#58a6ff');
                return `color${idx + 1} = RGBColor[${(rgb[0] / 255).toFixed(3)}, ${(rgb[1] / 255).toFixed(3)}, ${(rgb[2] / 255).toFixed(3)}]`;
            });
            const dataList = validCurves.map((_, idx) => `data${idx + 1}`).join(', ');
            const colorList = validCurves.map((_, idx) => `color${idx + 1}`).join(', ');
            const legends = validCurves.map(curve => `"${safeName(curve.name)}"`).join(', ');
            const xMaxExpr = validCurves.length
                ? `Max@Flatten@{${validCurves.map((_, idx) => `data${idx + 1}[[All, 1]]`).join(', ')}}`
                : `Max@Flatten@{}`;
            const epilog = buildMathematicaMarksForCurves(tab, validCurves);
            return `Module[{${validCurves.map((_, idx) => `data${idx + 1}`).join(', ')}, ${validCurves.map((_, idx) => `color${idx + 1}`).join(', ')}, xMax},
  ${dataDefs.join(';\n  ')};
  ${colorDefs.join(';\n  ')};
  xMax = ${xMaxExpr};
  ListLinePlot[{${dataList}},
    PlotRange -> {{0, xMax}, {0, 14}},
    PlotStyle -> ${validCurves.length ? `{${validCurves.map((_, idx) => `Directive[color${idx + 1}, Thick]`).join(', ')}}` : `{Thick}`},
    AxesLabel -> {"V (mL)", "pH"},
    ImageSize -> Large,
    GridLines -> Automatic,
    GridLinesStyle -> Directive[GrayLevel[0.8, 0.3]],
    PlotLegends -> {${legends}}${epilog ? `,\n    ${epilog}` : ''}
  ]
]`;
        }

        function buildMathematicaEquation(cfg) {
            function formatK(list) { return `{${list.map(pk => `10^-(${pk})`).join(', ')}}`; }
            const V0 = cfg.solution.V0;
            const solAcids = cfg.solution.components.filter(c => c.type === 'acid');
            const solBases = cfg.solution.components.filter(c => c.type === 'base');
            const titAcids = cfg.titrant.components.filter(c => c.type === 'acid');
            const titBases = cfg.titrant.components.filter(c => c.type === 'base');
            const isAcidTitratingBase = cfg.titrationType === 'acid-base';
            const buildBaseTerm = (c, factor) => {
                const n = c.kValues ? c.kValues.length : 0;
                if (n === 0) {
                    return `(${factor}) * ${c.valence || 1} * 1`;
                }
                return `(${factor}) * ${c.valence || 1} * With[{Kb=${formatK(c.kValues || [])}, n=${n}}, (Sum[i*Times@@Kb[[;;i]]*10^((pH-14)*(n-i)), {i,1,n}])/(10^((pH-14)*n)+Sum[Times@@Kb[[;;t]]*10^((pH-14)*(n-t)), {t,1,n}])]`;
            };
            const buildAcidTerm = (c, factor) => {
                const m = c.kValues ? c.kValues.length : 0;
                if (m === 0) {
                    return `(${factor}) * ${c.valence || 1} * 1`;
                }
                return `(${factor}) * ${c.valence || 1} * With[{Ka=${formatK(c.kValues || [])}, m=${m}}, (Sum[j*Times@@Ka[[;;j]]*10^(-pH*(m-j)), {j,1,m}])/(10^(-pH*m)+Sum[Times@@Ka[[;;t]]*10^(-pH*(m-t)), {t,1,m}])]`;
            };
            
            let leftTerms, rightTerms;
            if (isAcidTitratingBase) {
                leftTerms = [
                    `10^-pH`,
                    ...solBases.map(c => buildBaseTerm(c, `${c.c}*${V0}/(V+${V0})`)),
                    ...titBases.map(c => buildBaseTerm(c, `${c.c}*V/(V+${V0})`))
                ];
                rightTerms = [
                    `10^(pH-14)`,
                    ...solAcids.map(c => buildAcidTerm(c, `${c.c}*${V0}/(V+${V0})`)),
                    ...titAcids.map(c => buildAcidTerm(c, `${c.c}*V/(V+${V0})`))
                ];
            } else {
                leftTerms = [
                    `10^-pH`,
                    ...titBases.map(c => buildBaseTerm(c, `${c.c}*V/(V+${V0})`)),
                    ...solBases.map(c => buildBaseTerm(c, `${c.c}*${V0}/(V+${V0})`))
                ];
                rightTerms = [
                    `10^(pH-14)`,
                    ...solAcids.map(c => buildAcidTerm(c, `${c.c}*${V0}/(V+${V0})`)),
                    ...titAcids.map(c => buildAcidTerm(c, `${c.c}*V/(V+${V0})`))
                ];
            }
            return `${leftTerms.join(" + ")} == ${rightTerms.join(" + ")}`;
        }





        function estimateInitialPH(cfg) {
            const solAcids = cfg.solution.components.filter(c => c.type === 'acid');
            const solBases = cfg.solution.components.filter(c => c.type === 'base');
            const acidCapacity = solAcids.reduce((acc, c) => acc + (c.c || 0) * (c.valence || (c.kValues ? c.kValues.length : 1)), 0);
            const baseCapacity = solBases.reduce((acc, c) => acc + (c.c || 0) * (c.valence || (c.kValues ? c.kValues.length : 1)), 0);
            if (acidCapacity > baseCapacity * 1.2) return 2.0;
            if (baseCapacity > acidCapacity * 1.2) return 12.0;
            return 7.0;
        }
        function buildMathematicaSolveBlock(cfg) {
            const eqn = buildMathematicaEquation(cfg);
            const pH0 = estimateInitialPH(cfg).toFixed(2);
            return `Module[{eqn = ${eqn}}, Clip[Quiet@Check[pH /. FindRoot[eqn, {pH, ${pH0}}, AccuracyGoal -> 8, PrecisionGoal -> 8, MaxIterations -> 100], 7], {0, 14}]]`;
        }

        function buildMathematicaCodeFromConfig(cfg, tab, curveName = null) {
            const V0 = cfg.solution.V0;
            const maxV = cfg.maxVolume;
            const sampleCount = cfg.sampleCount || 1000;
            const rgb = hexToRGBTuple(cfg.curveColor || '#58a6ff');
            const solveBlock = buildMathematicaSolveBlock(cfg);
            const rgbStr = `RGBColor[${(rgb[0]/255).toFixed(3)}, ${(rgb[1]/255).toFixed(3)}, ${(rgb[2]/255).toFixed(3)}]`;
            const epilog = buildMathematicaMarks(tab, curveName, rgbStr);
            return `Module[{V0=${V0}, maxV=${maxV}, color=${rgbStr}, data},
  data = Table[{V, ${solveBlock}}, {V, 0, maxV, maxV/${sampleCount}}];
  ListLinePlot[data,
    PlotRange -> {{0, maxV}, {0, 14}},
    PlotStyle -> {color, Thick},
    AxesLabel -> {"V (mL)", "pH"},
    ImageSize -> Large,
    GridLines -> Automatic,
    GridLinesStyle -> Directive[GrayLevel[0.8, 0.3]]${epilog ? `,\n    ${epilog}` : ''}
  ]
]`;
        }

        function normalizeSearchText(text) {
            const map = {
                '₀': '0',
                '₁': '1',
                '₂': '2',
                '₃': '3',
                '₄': '4',
                '₅': '5',
                '₆': '6',
                '₇': '7',
                '₈': '8',
                '₉': '9'
            };
            return (text || '')
                .toLowerCase()
                .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, (m) => map[m] || m)
                .replace(/[^a-z0-9\u4e00-\u9fa5]/g, '');
        }

        function renderPresetList(searchTerm = '') {
            const list = document.getElementById('presetList');

            const targetType = currentAddMode === 'solution' ?
                (isAcidTitratingBase ? 'base' : 'acid') :
                (isAcidTitratingBase ? 'acid' : 'base');

        function applyChartWidth(tab, value) {
            if (!tab) return;
            const pane = getTabContent(tab);
            if (!pane) return;
            const wrapper = pane.querySelector('.chart-wrapper') || pane.querySelector('.chart-container-with-indicator .chart-wrapper');
            if (!wrapper) return;
            const width = parseInt(value, 10);

            if (Number.isFinite(width) && width > 0) {
                wrapper.style.setProperty('--chart-custom-width', `${width}px`);
                wrapper.classList.add('custom-width');
            } else {
                wrapper.style.setProperty('--chart-custom-width', '100%');
                wrapper.classList.remove('custom-width');
            }

            if (tab.chart) {
                tab.chart.resize();
            }
        }

        function applyChartAspectRatio(tab, ratioValue) {
            if (!tab) return;
            if (!ratioValue) return;
            const pane = getTabContent(tab);
            if (!pane) return;
            const chartWidthInput = pane.querySelector('[data-role="chart-width"]');
            if (!chartWidthInput) return;
            if (ratioValue === 'auto') {
                chartWidthInput.value = '';
                applyChartWidth(tab, '');
                return;
            }
            const parts = ratioValue.split(':').map(Number);
            if (parts.length !== 2 || !parts[0] || !parts[1]) return;
            const wrapper = pane.querySelector('.chart-wrapper') || pane.querySelector('.chart-container-with-indicator .chart-wrapper');
            const height = wrapper ? wrapper.getBoundingClientRect().height : 420;
            const width = Math.round(height * (parts[0] / parts[1]));
            chartWidthInput.value = width;
            applyChartWidth(tab, width);
        }

                        <li><strong>Sample Points</strong>: Calculation precision - higher values produce smoother curves (recommended 200-500)</li>
                    </ul>
                    
                    <h3>3. Adding Acid/Base Components</h3>
                    <p>Add acids or bases in the "Solution Components" and "Titrant Components" sections:</p>
                    <ul>
                        <li>Click <strong>+ Add Acid</strong> or <strong>+ Add Base</strong> button</li>
                        <li>Choose from preset common acids/bases (e.g., HCl, NaOH, CH₃COOH)</li>
                        <li>Or select "Manual Setup" for custom parameters</li>
                        <li>Set concentration (mol/L) and ionization constants (pKa/pKb)</li>
                        <li><strong>Polyprotic acids/bases</strong>: Set multiple ionization constants (comma-separated), e.g., phosphoric acid pKa1=2.12, pKa2=7.21, pKa3=12.67</li>
                        <li><strong>Charge number</strong>: Set ionic charge (default 1)</li>
                    </ul>
                    
                    <h3>4. Viewing Results</h3>
                    <p>After configuration, the titration curve will be displayed automatically:</p>
                    <ul>
                        <li><strong>Curve Chart</strong>: Shows pH vs titrant volume curve</li>
                        <li><strong>Data Table</strong>: Shows specific values for each point (volume, pH, derivative)</li>
                        <li><strong>Key Points</strong>: Automatically marks jump range and stoichiometric points</li>
                        <li><strong>Parameters</strong>: Displays detailed configuration information</li>
                    </ul>
                    
                    <h3>5. Export Features</h3>
                    <p>Multiple export options available:</p>
                    <ul>
                        <li><strong>Download Chart</strong>: Export curve as PNG/JPG image with adjustable resolution</li>
                        <li><strong>Generate Mathematica Code</strong>: Export code for Mathematica calculation with complete root-finding logic</li>
                        <li><strong>Generate Titration Equation</strong>: Display equation based on charge balance in LaTeX format</li>
                    </ul>
                    
                    <h3>6. Multi-Curve Comparison</h3>
                    <p>Compare multiple titration curves simultaneously:</p>
                    <ul>
                        <li>Click <strong>Add Curve</strong> to create new curve configuration</li>
                        <li>Check which curves to display in multi-curve chart</li>
                        <li>Customize color and line width for each curve</li>
                        <li>Export Mathematica code for multiple curves at once</li>
                    </ul>
                    
                    <h3>7. Interactive Operations</h3>
                    <ul>
                        <li><strong>Hover Preview</strong>: Hover over curve to see detailed values (volume, pH, derivative, buffer index)</li>
                        <li><strong>Mark Key Points</strong>: <strong>Long press for ~0.7 seconds</strong> on curve to add/remove permanent markers</li>
                        <li><strong>Adjust Chart Width</strong>: Customize chart display width in pixels</li>
                        <li><strong>Chart Style</strong>: Switch between "Paper Style" and "Standard Style"</li>
                        <li><strong>Navigate by Volume</strong>: Input volume value to quickly locate corresponding point on curve</li>
                        <li><strong>Show Raw Data Points</strong>: Toggle visibility of raw calculation data points</li>
                    </ul>
                    
                    <h3>8. Preset Acid/Base Library</h3>
                    <p>The program includes rich preset acids and bases:</p>
                    <ul>
                        <li><strong>Strong Acids</strong>: Hydrochloric acid (HCl), Nitric acid (HNO₃), Perchloric acid (HClO₄)</li>
                        <li><strong>Weak Acids</strong>: Acetic acid (CH₃COOH), Carbonic acid (H₂CO₃), Phosphoric acid (H₃PO₄), Hydrofluoric acid (HF)</li>
                        <li><strong>Strong Bases</strong>: Sodium hydroxide (NaOH), Potassium hydroxide (KOH), Barium hydroxide (Ba(OH)₂)</li>
                        <li><strong>Weak Bases</strong>: Ammonia (NH₃), Methylamine (CH₃NH₂), Ethylamine (C₂H₅NH₂)</li>
                    </ul>
                    <p>Use the search box to quickly find acids/bases by name or chemical formula.</p>
